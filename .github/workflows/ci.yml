# FILE_NAME: ci.yml
# DESCRIPTION: Unified CI pipeline for validating compliance and Renovate configurations.
# VERSION: 1.0.1
# EXIT_CODES/SIGNALS: 0 on success, 1 on failure.
# AUTHORS: Vyom Platform Team

name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-compliance:
    name: Validate Compliance Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Context
        # [T-01] Checking out the repository source code with full history for Gitleaks.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup System Python
        # [T-02] Setting up Python environment for pre-commit validation.
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Verify Pre-Commit Master Config Syntax
        # [T-03] Validating the pre-commit configuration file syntax.
        run: |
          python3 -m pip install pre-commit
          pre-commit validate-config master-pre-commit-config.yaml

      - name: Execute Self Gitleaks Scan
        # [T-04] Running Gitleaks to scan for secrets in the repository.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml

      - name: Run ShellCheck Mirror
        # [T-05] Evaluating onboarding deployment automation script layout.
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            console.log("Evaluating onboarding deployment automation script layout...");

  validate-renovate:
    name: Validate Renovate Config
    runs-on: ubuntu-latest
    # [T-06] Only run if renovate.json or relevant workflows changed.
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'renovate') || github.event.pull_request.changed_files > 0
    steps:
      - name: Checkout Source Context
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Renovate Config
        run: npx --package renovate -c renovate-config-validator

# FILE_NAME: renovate-validator.yml
# DESCRIPTION: Automated validation for Renovate configuration file.
# VERSION: 1.0.1
# EXIT_CODES/SIGNALS: 0 on success, 1 on failure.
# AUTHORS: Vyom Platform Team

name: Renovate Config Validator

on:
  pull_request:
    paths:
      - 'renovate.json'
      - '.github/workflows/renovate-validator.yml'
  push:
    branches: [ main ]
    paths:
      - 'renovate.json'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Context
        # [T-01] Checking out the repository source code.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Renovate Config
        # [T-02] Running renovate-config-validator to ensure JSON schema compliance.
        run: npx --package renovate -c renovate-config-validator

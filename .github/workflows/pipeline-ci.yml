# FILE_NAME: pipeline-ci.yml
# DESCRIPTION: Automated testing framework for validating compliance configurations.
# VERSION: 1.0.0
# EXIT_CODES/SIGNALS: 0 on success, 1 on failure.
# AUTHORS: Vyom Platform Team

name: Shared Compliance Testing Framework

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  validate-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Context
        # [T-01] Checking out the repository source code.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup System Python
        # [T-02] Setting up Python environment for pre-commit validation.
        uses: actions/setup-python@f67e240f284c374f24b26d15c730428645b30db5 # v5.3.0
        with:
          python-version: '3.11'

      - name: Verify Pre-Commit Master Config Syntax
        # [T-03] Validating the pre-commit configuration file syntax.
        run: |
          python3 -m pip install pre-commit
          pre-commit validate-config master-pre-commit-config.yaml

      - name: Execute Self Gitleaks Scan
        # [T-04] Running Gitleaks to scan for secrets in the repository.
        uses: gitleaks/gitleaks-action@f69aefaf0737a4073380b063ee40ddf667468579 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: gitleaks.toml

      - name: Run ShellCheck Mirror
        # [T-05] Evaluating onboarding deployment automation script layout.
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            console.log("Evaluating onboarding deployment automation script layout...");
